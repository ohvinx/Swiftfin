name: "Build Unsigned Swiftfin IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    strategy:
      matrix:
        scheme: ["Swiftfin"] # Add "Swiftfin tvOS" if needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: brew install swiftgen carthage

      - name: Cache Carthage
        uses: actions/cache@v4
        with:
          path: Carthage
          key: ${{ runner.os }}-carthage-${{ hashFiles('**/Cartfile.resolved') }}

      - name: Update Carthage
        run: carthage update --use-xcframeworks --platform ios --cache-builds

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project Swiftfin.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -configuration Release \
            -archivePath build/${{ matrix.scheme }}.xcarchive \
            -destination "generic/platform=iOS" \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # Copy the .app bundle from the archive into the Payload folder
          cp -r build/${{ matrix.scheme }}.xcarchive/Products/Applications/*.app Payload/
          # Zip it and rename to .ipa
          zip -r "${{ matrix.scheme }}_Unsigned.ipa" Payload
          mkdir -p output
          mv "${{ matrix.scheme }}_Unsigned.ipa" output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-Unsigned-IPA
          path: output/*.ipa
